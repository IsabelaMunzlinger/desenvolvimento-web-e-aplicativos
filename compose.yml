services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: laravel12-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: laravel12-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

 # O serviço de banco de dados MySQL, container para o banco
  db:
    image: mysql:8.0
    container_name: laravel12-db
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
    # Uma porta do host (3306) é mapeada para a porta do container (3307), permitindo que o banco de dados seja acessado externamente.
      - "3307:3306" # Mapeia a porta 3306 do container para a porta 3307 do host.
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
